name: quality-node24

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Node 24 + npm 11.18.0
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm 11.18.0
        run: npm install --global npm@11.18.0

      - name: Confirm versions
        run: |
          node -v
          npm -v
          test "$(npm -v)" = "11.18.0"

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Behavioral tests
        run: npm run test

      - name: Accessibility tests
        run: npm run test:a11y

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E (Chromium)
        run: npm run e2e

      - name: Snapshot routeTree.gen.ts (pre-build)
        run: cp src/routeTree.gen.ts /tmp/routeTree.baseline.ts

      - name: Build (1st pass)
        run: npm run build

      - name: Build (2nd pass)
        run: npm run build

      - name: Verify routeTree.gen.ts is stable after two consecutive builds
        run: |
          if ! diff -u /tmp/routeTree.baseline.ts src/routeTree.gen.ts; then
            echo "::error::src/routeTree.gen.ts changed after running the build twice. The generator output is unstable relative to the committed file."
            exit 1
          fi
          if [ -n "$(git status --porcelain src/routeTree.gen.ts)" ]; then
            echo "::error::src/routeTree.gen.ts has uncommitted changes after the build."
            git --no-pager diff src/routeTree.gen.ts
            exit 1
          fi
          echo "src/routeTree.gen.ts is stable across two consecutive builds."

      - name: Production dependency audit (fail on high+)
        run: npm audit --omit=dev --audit-level=high

      - name: Development dependency audit (report only)
        if: always()
        run: npm audit || true
